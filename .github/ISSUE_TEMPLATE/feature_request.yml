name: Feature Request
description: Suggest an improvement or new distro/DE support
labels: [enhancement]
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New distro support
        - New desktop environment / compositor
        - Installer improvement
        - Launch / UX
        - Logging / debugging
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or friction point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Include specific file paths or commands if you have them.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds exist today? Why are they insufficient?

  - type: checkboxes
    id: pr
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a PR for this
